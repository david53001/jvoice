<!DOCTYPE html>
<!-- Staged demo renderer for the README GIF. Each frame is rendered
     deterministically from the ?f=N query param (10 fps, 80 frames).
     Rendered by render.sh via headless Chrome; assembled with ffmpeg. -->
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 800px; height: 500px; overflow: hidden; }
  body {
    font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
    background: linear-gradient(135deg, #1a2151 0%, #3b2f63 45%, #71445e 100%);
    position: relative;
  }

  /* ── menu bar ─────────────────────────────────────────── */
  .menubar {
    position: absolute; top: 0; left: 0; right: 0; height: 28px;
    background: rgba(20, 18, 40, .55); backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px; color: rgba(255,255,255,.92); font-size: 13px;
  }
  .menubar .left  { display: flex; gap: 16px; align-items: center; }
  .menubar .right { display: flex; gap: 14px; align-items: center; font-size: 12px; }
  .apple { font-size: 14px; }
  .mb-mic {
    width: 16px; height: 16px; display: inline-block; position: relative;
  }
  .mb-mic .cap {
    position: absolute; left: 5px; top: 1px; width: 6px; height: 9px;
    border-radius: 3px; background: currentColor;
  }
  .mb-mic .arc {
    position: absolute; left: 2.5px; top: 4px; width: 11px; height: 8px;
    border: 1.5px solid currentColor; border-top: none;
    border-radius: 0 0 7px 7px;
  }
  .mb-mic .stem {
    position: absolute; left: 7.25px; bottom: 0; width: 1.5px; height: 4px;
    background: currentColor;
  }
  .mb-mic.rec { color: #ff5d55; }

  /* ── notes window ─────────────────────────────────────── */
  .window {
    position: absolute; left: 120px; top: 64px; width: 560px; height: 300px;
    background: #f7f4ee; border-radius: 12px;
    box-shadow: 0 24px 60px rgba(0,0,0,.45), 0 2px 8px rgba(0,0,0,.3);
    overflow: hidden;
  }
  .titlebar {
    height: 38px; background: #ece8df; display: flex; align-items: center;
    padding: 0 14px; gap: 8px; border-bottom: 1px solid #ddd8cc;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.r { background: #ff5f57; } .dot.y { background: #febc2e; } .dot.g { background: #28c840; }
  .wtitle { flex: 1; text-align: center; font-size: 13px; color: #8d8678; font-weight: 600; margin-right: 44px; }
  .note {
    padding: 22px 26px; font-size: 19px; line-height: 1.55; color: #2d2a24;
  }
  .note .date { font-size: 11px; color: #a39b8a; text-align: center; margin-bottom: 14px; }
  .caret {
    display: inline-block; width: 2px; height: 22px; background: #e0651a;
    vertical-align: -4px; margin-left: 1px;
  }
  .caret.off { opacity: 0; }

  /* ── keycap overlay ───────────────────────────────────── */
  .keys {
    position: absolute; left: 50%; bottom: 150px; transform: translateX(-50%);
    display: flex; gap: 8px; opacity: 0; align-items: center;
  }
  .keys.show { opacity: 1; }
  .keycap {
    min-width: 44px; padding: 9px 14px; text-align: center;
    background: rgba(255,255,255,.95); border-radius: 9px;
    font-size: 16px; font-weight: 600; color: #333;
    box-shadow: 0 3px 0 rgba(0,0,0,.35), 0 8px 20px rgba(0,0,0,.3);
  }
  .keys.pressed .keycap { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,.35), 0 4px 12px rgba(0,0,0,.3); }
  .plus { color: rgba(255,255,255,.85); font-weight: 700; }

  /* ── HUD pill ─────────────────────────────────────────── */
  .pill {
    position: absolute; left: 50%; bottom: 56px; transform: translateX(-50%);
    height: 44px; padding: 0 20px; border-radius: 22px;
    background: rgba(28, 26, 34, .92); backdrop-filter: blur(8px);
    display: none; align-items: center; gap: 11px;
    box-shadow: 0 12px 32px rgba(0,0,0,.5);
    color: #f2f0ec; font-size: 14px; font-weight: 600;
  }
  .pill.show { display: flex; }
  .reddot { width: 11px; height: 11px; border-radius: 50%; background: #ff453a; }
  .wave { display: flex; gap: 2.5px; align-items: center; height: 24px; }
  .wave i { width: 3px; border-radius: 2px; background: #ff9f0a; display: block; }
  .spinner {
    width: 15px; height: 15px; border-radius: 50%;
    border: 2.5px solid rgba(255,255,255,.25); border-top-color: #ff9f0a;
  }
  .check { color: #30d158; font-size: 16px; }

  /* spoken caption */
  .spoken {
    position: absolute; left: 50%; bottom: 112px; transform: translateX(-50%);
    font-size: 14px; font-style: italic; color: rgba(255,255,255,.75);
    text-shadow: 0 1px 6px rgba(0,0,0,.6); white-space: nowrap;
  }

  /* end badge */
  .badge {
    position: absolute; left: 50%; bottom: 22px; transform: translateX(-50%);
    font-size: 12.5px; font-weight: 600; color: rgba(255,255,255,.85);
    text-shadow: 0 1px 6px rgba(0,0,0,.6); letter-spacing: .02em;
    opacity: 0;
  }
  .badge.show { opacity: 1; }
  .badge .sep { opacity: .5; margin: 0 6px; }
</style>
</head>
<body>
  <div class="menubar">
    <div class="left"><strong>Notes</strong><span>File</span><span>Edit</span><span>Format</span></div>
    <div class="right"><span class="mb-mic" id="mbmic"><span class="cap"></span><span class="arc"></span><span class="stem"></span></span><span>Fri Jun 5</span><span>9:41 AM</span></div>
  </div>

  <div class="window">
    <div class="titlebar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="wtitle">Practice plan</span></div>
    <div class="note">
      <div class="date">June 5 at 9:41 AM</div>
      <span id="typed"></span><span class="caret" id="caret"></span>
    </div>
  </div>

  <div class="keys" id="keys"><span class="keycap">⌥</span><span class="plus">+</span><span class="keycap">space</span></div>
  <div class="spoken" id="spoken"></div>

  <div class="pill" id="pill">
    <span class="reddot" id="reddot"></span>
    <span class="wave" id="wave"></span>
    <span class="spinner" id="spinner" style="display:none"></span>
    <span class="check" id="check" style="display:none">✓</span>
    <span id="pilltext">Listening…</span>
  </div>

  <div class="badge" id="badge">filler words removed<span class="sep">·</span>100% on-device<span class="sep">·</span>free forever</div>

<script>
  const f = parseInt(new URLSearchParams(location.search).get('f') || '0', 10);
  const $ = id => document.getElementById(id);
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

  // ── timeline (10 fps, 80 frames) ──────────────────────────
  // 0–7    idle, caret blinks
  // 8–11   ⌥+space pressed (start)
  // 12–38  recording: pill + waveform + spoken caption builds
  // 39–42  ⌥+space pressed (stop)
  // 43–54  transcribing spinner
  // 55–72  text types into note, pill shows ✓ Inserted
  // 73–79  badge, hold for loop
  const SPOKEN = ['“hey', 'um', 'can', 'we', 'move', 'practice', 'to', 'thursday', 'at', 'five”'];
  const FINAL  = 'Hey! Can we move practice to Thursday at 5?';

  // caret blink (always)
  $('caret').classList.toggle('off', Math.floor(f / 4) % 2 === 1);

  // keycaps
  if ((f >= 8 && f <= 11) || (f >= 39 && f <= 42)) {
    $('keys').classList.add('show');
    if (f <= 9 || (f >= 39 && f <= 40)) $('keys').classList.add('pressed');
  }

  const recording = f >= 12 && f <= 42;
  const transcribing = f >= 43 && f <= 54;
  const done = f >= 55;

  if (recording || transcribing || (done && f <= 72)) $('pill').classList.add('show');

  // menu bar mic goes red while recording
  if (recording) $('mbmic').classList.add('rec');

  // waveform bars — deterministic pseudo-audio
  if (recording) {
    const wave = $('wave');
    for (let i = 0; i < 22; i++) {
      const bar = document.createElement('i');
      const a = Math.abs(Math.sin(f * 0.93 + i * 0.74)) * Math.abs(Math.sin(f * 0.31 + i * 1.7));
      bar.style.height = (4 + a * 19) + 'px';
      wave.appendChild(bar);
    }
  } else {
    $('wave').style.display = 'none';
    $('reddot').style.display = 'none';
  }

  // spoken caption builds word by word over f 14–36
  if (f >= 14 && f <= 42) {
    const n = clamp(Math.floor((f - 14) / 2.3) + 1, 1, SPOKEN.length);
    $('spoken').textContent = SPOKEN.slice(0, n).join(' ');
  }

  if (transcribing) {
    $('spinner').style.display = 'block';
    $('spinner').style.transform = 'rotate(' + (f * 55 % 360) + 'deg)';
    $('pilltext').textContent = 'Transcribing…';
  }

  if (done) {
    if (f <= 72) {
      $('check').style.display = 'inline';
      $('pilltext').textContent = 'Inserted';
    }
    const n = Math.floor(clamp((f - 55) / 15, 0, 1) * FINAL.length);
    $('typed').textContent = FINAL.slice(0, n);
  }

  if (f >= 73) $('badge').classList.add('show');
</script>
</body>
</html>
