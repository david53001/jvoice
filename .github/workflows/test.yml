name: Test

on:
  pull_request:
  push:
    branches: [main, "feat/**", "fix/**"]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-test:
    name: swift test
    # macos-15 + Xcode 16 is required: swift-testing (`import Testing`) only
    # executes under `swift test` from Swift 6 / Xcode 16 toolchains. The old
    # macos-14 + Xcode 15.4 pin compiled the suite out via the
    # `#if canImport(Testing)` guards — 78 of 96 cases silently never ran.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_16.2.app 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
      - name: Resolve packages
        run: swift package resolve
      - name: Build release configuration
        # The shipped artifact (release DMG) is built in release config; CI
        # must compile it so a release-only break or `#else` fallback path
        # (non-WhisperKit branches) can't ship undetected.
        run: swift build -c release
      - name: Run tests
        run: |
          set -o pipefail
          swift test 2>&1 | tee test.log
      - name: Run local logic verification scripts
        # These are the source of truth for the pure-logic core on a CLT-only
        # machine; running them in CI keeps them compiling/passing against
        # current sources (they need only the Swift toolchain — no WhisperKit,
        # no mic).
        run: |
          bash ./scripts/run-logic-tests.sh
          bash ./scripts/verify-streaming.sh
      - name: Verify the swift-testing suite actually ran
        # Two layers of protection against the `#if canImport(Testing)`
        # silent-skip trap:
        #   1. The swift-testing run summary must be present (XCTest output
        #      alone — the 4 fallback files — must NOT satisfy this).
        #   2. The executed-case count must track the authored count. Instead
        #      of a hard-coded floor (which erodes as the suite grows), count
        #      the authored `@Test` cases in Tests/ and require executed
        #      >= authored - 5 (a small slack for legitimate removals). This is
        #      self-maintaining: adding tests raises the floor automatically,
        #      while a wholesale silent skip still fails the build.
        run: |
          SUMMARY=$(grep -Eo "Test run with [0-9]+ tests" test.log | head -1 || true)
          if [ -z "$SUMMARY" ]; then
            echo "::error::swift-testing run summary not found — the Testing suite did not execute (toolchain too old?)."
            exit 1
          fi
          COUNT=$(echo "$SUMMARY" | grep -Eo "[0-9]+")
          AUTHORED=$(grep -rohE '@Test' Tests | wc -l | tr -d ' ')
          echo "swift-testing authored=$AUTHORED executed=$COUNT"
          if [ "$COUNT" -lt "$((AUTHORED - 5))" ]; then
            echo "::error::Only $COUNT swift-testing cases executed (authored $AUTHORED, allowed slack 5). Tests are being silently skipped."
            exit 1
          fi
