name: Test

on:
  pull_request:
  push:
    branches: [main, "feat/**", "fix/**"]

jobs:
  swift-test:
    name: swift test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Resolve packages
        run: swift package resolve
      - name: Run tests
        run: |
          set -o pipefail
          swift test 2>&1 | tee test.log
      - name: Verify tests actually ran
        # Guard against the `#if canImport(Testing)` silent-skip path.
        # If no @Test cases executed, the suite produced nothing — fail.
        run: |
          if ! grep -E "Test (Suite|case|Run)" test.log > /dev/null; then
            echo "::error::No tests appear to have executed. Check Swift Testing toolchain."
            exit 1
          fi
